services:

  autoeda-app:
    build: .
    container_name: autoeda-app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend --reload-dir /app/agents --timeout-graceful-shutdown 1
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./shared:/app/shared
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      # Mount live .git so agents can commit/push from inside the container
      - ./.git:/app/.git
      # Mount Claude Code config (writable so agents can save session history)
      - ${CLAUDE_CONFIG_DIR:-C:/Users/jimi/.claude}:/root/.claude
      # Mount Docker socket so agents can rebuild/restart containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=redis://autoeda-redis:6379
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/data/outputs
      - UPLOAD_DIR=/app/data/uploads
      - GITHUB_TOKEN=${AUTOEDA_GITHUB_TOKEN:-}
      - ANTHROPIC_API_KEY=${AUTOEDA_ANTHROPIC_API_KEY:-}
      # Project name for agent self-rebuild via docker compose
      - COMPOSE_PROJECT_NAME=autoeda
    depends_on:
      - autoeda-redis
    restart: unless-stopped
    networks:
      - infra_net

  autoeda-worker:
    build: .
    container_name: autoeda-worker
    command: python backend/worker.py
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./shared:/app/shared
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./.git:/app/.git
      - ${CLAUDE_CONFIG_DIR:-C:/Users/jimi/.claude}:/root/.claude
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=redis://autoeda-redis:6379
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/data/outputs
      - UPLOAD_DIR=/app/data/uploads
      - GITHUB_TOKEN=${AUTOEDA_GITHUB_TOKEN:-}
      - ANTHROPIC_API_KEY=${AUTOEDA_ANTHROPIC_API_KEY:-}
    depends_on:
      - autoeda-redis
    restart: unless-stopped
    networks:
      - infra_net

  autoeda-redis:
    image: redis:7-alpine
    container_name: autoeda-redis
    command: --save 60 1 --loglevel warning
    volumes:
      - autoeda_redis_data:/data
    restart: unless-stopped
    networks:
      - infra_net

networks:
  infra_net:
    external: true

volumes:
  autoeda_redis_data:
