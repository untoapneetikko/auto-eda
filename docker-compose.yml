version: "3.9"

services:
  app:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend --reload-dir /app/agents --timeout-graceful-shutdown 1
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./shared:/app/shared
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      # Mount live .git so agents can commit/push from inside the container
      - ./.git:/app/.git
      # Mount Claude Code config (writable so agents can save session history)
      - ${CLAUDE_CONFIG_DIR:-C:/Users/akiny/.claude}:/root/.claude
      # Mount Docker socket so agents can rebuild/restart containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/data/outputs
      - UPLOAD_DIR=/app/data/uploads
      # GitHub token for agent git push — set in .env or shell: export GITHUB_TOKEN=ghp_...
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Needed so 'docker compose' inside the container resolves the right project
      - COMPOSE_PROJECT_NAME=auto-eda
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: python backend/worker.py
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./shared:/app/shared
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./.git:/app/.git
      # Mount Claude Code config (writable so agents can save session history)
      - ${CLAUDE_CONFIG_DIR:-C:/Users/akiny/.claude}:/root/.claude
      # Mount Docker socket so agents can rebuild/restart containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/data/outputs
      - UPLOAD_DIR=/app/data/uploads
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    # Quick tunnel — no account needed, URL printed in logs on startup
    command: tunnel --no-autoupdate --url http://app:8000
    depends_on:
      - app
    restart: unless-stopped

volumes:
  redis_data:
