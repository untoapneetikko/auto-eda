version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./shared:/app/shared
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      # Mount Claude Code config (writable so agents can save session history)
      - ${CLAUDE_CONFIG_DIR:-C:/Users/akiny/.claude}:/root/.claude
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/data/outputs
      - UPLOAD_DIR=/app/data/uploads
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: python backend/worker.py
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./shared:/app/shared
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      # Mount Claude Code config (writable so agents can save session history)
      - ${CLAUDE_CONFIG_DIR:-C:/Users/akiny/.claude}:/root/.claude
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/data/outputs
      - UPLOAD_DIR=/app/data/uploads
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    # Quick tunnel — no account needed, URL printed in logs on startup
    command: tunnel --no-autoupdate --url http://app:8000
    depends_on:
      - app
    restart: unless-stopped

volumes:
  redis_data:
